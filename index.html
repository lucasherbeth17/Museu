<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museu da Fotográfia de Tabuleiro do Norte</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div>
            <img src="#" alt="Logo do Museu">
        </div>
        <nav>
            <a href="#">Sobre</a>
            <a href="#">Galeria</a>
            <a href="#">Contato</a>
            <button class="formulario" onclick="abrirEnvio()">Contribua</button>
        </nav>
    </header>

    <main>
        <section>
            <div>
                <h1>Preservando Memórias</h1>
                <p>Acervo de Fotografias do Tabuleiro do Norte.</p>
            </div>
        </section>

        <section>
            <h2>Galeria de Fotografias</h2>
            <div class="galeria">
                <div onclick="abrirImagem()">
                <img src="foto1.jpg" alt="Foto 1">
                </div>
                <div onclick="abrirImagem()">
                <img src="foto2.jpg" alt="Foto 2">
                </div>
                <div onclick="abrirImagem()">
                <img src="foto3.jpg" alt="Foto 3">
                </div>
                <!-- Mais fotos aqui, sempre ir adicionando -->
            </div>
        </section>
    </main>

    <div>
        <div id="#" class="#">
            <span class="#" onclick="fecharEnvio()">&times;</span>
            <h2>Contribua com o Museu</h2>
            <p>Envie sua fotografia histórica para ser adicionada ao acervo do museu. </p>
            <iframe 
            src="https://docs.google.com/forms/d/e/1FAIpQLSdA5zmMN_5uvWzeFKl12RgBIvxEbvdkR13EHno_vkI6e7rpPg/viewform?embedded=true" 
            width="100%" height="600px" frameborder="0">
            </iframe>
    </div>

    <div id="#" class="#">
        <span class="#" onclick="fecharImagem()">&times;</span>
        <img class="#" id="#" alt="#">
    </div>

    <footer>
        <p>&copy; 2026 Museu da Fotográfia de Tabuleiro do Norte. Todos os direitos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
